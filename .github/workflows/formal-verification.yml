# paste contents
# =============================================================================
# .github/workflows/formal-verification.yml
# stellAIverse-contracts | Issue #104
#
# Runs Certora formal verification on every push to main/develop and on
# any PR that touches contract source or spec files.
# Blocks merge if verification fails.
# =============================================================================

name: Formal Verification

on:
  push:
    branches: [main, develop]
    paths:
      - "contracts/**"
      - "formal-verification/specs/**"
      - "formal-verification/run-formal-verification.sh"
  pull_request:
    branches: [main, develop]
    paths:
      - "contracts/**"
      - "formal-verification/specs/**"
      - "formal-verification/run-formal-verification.sh"
  workflow_dispatch:   # allow manual trigger

concurrency:
  group: formal-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Certora Formal Verification
    runs-on: ubuntu-latest
    timeout-minutes: 90    # 3 contracts × 30 min max

    permissions:
      contents: read
      checks: write        # post verification status as check

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust / Soroban toolchain ─────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm optimizer
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build contracts (WASM)
        run: bash ./scripts/build-optimized-wasm.sh governance Cargo.toml

      # ── Python / Certora CLI ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Certora CLI
        run: pip install certora-cli

      - name: Verify Certora CLI version
        run: certoraRun --version

      # ── Run formal verification ──────────────────────────────────────────────
      - name: Run formal verification (all contracts)
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
        run: |
          chmod +x formal-verification/run-formal-verification.sh
          ./formal-verification/run-formal-verification.sh

      # ── Upload results ───────────────────────────────────────────────────────
      - name: Upload verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-verification-results-${{ github.sha }}
          path: formal-verification/results/
          retention-days: 30

      # ── Post summary ─────────────────────────────────────────────────────────
      - name: Post verification summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsDir = 'formal-verification/results';
            let summary = '## 🔐 Formal Verification Results\n\n';

            const contracts = ['agent_nft', 'marketplace', 'execution_hub'];
            for (const c of contracts) {
              const path = `${resultsDir}/${c}_result.json`;
              if (fs.existsSync(path)) {
                summary += `- **${c}**: ✅ Verified\n`;
              } else {
                summary += `- **${c}**: ❌ Failed or not run\n`;
              }
            }

            summary += `\n_Commit: ${context.sha.slice(0, 7)}_`;

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            } catch (error) {
              core.warning(`Skipping PR comment: ${error.message}`);
            }
